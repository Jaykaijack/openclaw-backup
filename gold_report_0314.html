<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>A股贵金属行情日报 - 2026年03月14日</title>
<style>
:root{--bg-deep:#0a0e1a;--bg-card:#111827;--accent-red:#ff4757;--accent-green:#2ed573;--accent-gold:#ffa502;--text-primary:#f1f2f6;--text-secondary:#a4b0be;--text-dim:#57606f;--border:rgba(255,255,255,0.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-deep);color:var(--text-primary);font-family:'PingFang SC','Microsoft YaHei',sans-serif;width:1280px}
.hero{position:relative;padding:40px 48px 32px;background:linear-gradient(135deg,#0a0e1a 0%,#1a1040 40%,#2d1b4e 70%,#0a0e1a 100%);overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;right:-20%;width:600px;height:600px;background:radial-gradient(circle,rgba(255,215,0,0.1) 0%,transparent 70%);pointer-events:none}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1}
.hero-title{font-size:36px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#ffd700 0%,#ffa502 50%,#ff6348 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:14px;color:var(--text-secondary);margin-top:8px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,215,0,0.15);border:1px solid rgba(255,215,0,0.3);border-radius:8px;padding:10px 18px}
.hero-badge-dot{width:8px;height:8px;border-radius:50%;background:#ffd700}
.hero-badge-text{font-size:13px;color:#ffd700;font-weight:600}
.hero-headline{margin-top:24px;padding:16px 20px;background:rgba(255,165,2,0.06);border-left:3px solid var(--accent-gold);border-radius:0 8px 8px 0;font-size:15px;line-height:1.8;color:var(--accent-gold);font-weight:500}
.content{padding:24px 48px 40px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.section{margin-bottom:24px}
.idx-card{background:var(--bg-card);border-radius:12px;padding:16px 18px;border:1px solid var(--border);position:relative;overflow:hidden}
.idx-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px}
.idx-card.up::after{background:linear-gradient(90deg,var(--accent-red),transparent)}
.idx-card.down::after{background:linear-gradient(90deg,var(--accent-green),transparent)}
.idx-card.gold::after{background:linear-gradient(90deg,#ffd700,transparent)}
.idx-name{font-size:12px;color:var(--text-secondary);margin-bottom:6px}
.idx-val{font-size:24px;font-weight:700;font-family:Menlo,monospace}
.idx-val.up{color:var(--accent-red)}
.idx-val.down{color:var(--accent-green)}
.idx-val.gold{color:#ffd700}
.idx-chg{font-size:13px;font-family:Menlo,monospace;margin-top:4px;font-weight:600}
.idx-chg.up{color:var(--accent-red)}
.idx-chg.down{color:var(--accent-green)}
.idx-tag{position:absolute;top:12px;right:14px;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;background:rgba(167,139,250,0.15);color:#a78bfa}
.sec-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.sec-icon{font-size:20px}
.sec-title{font-size:16px;font-weight:700;letter-spacing:1px}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{text-align:left;color:var(--text-dim);font-weight:500;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.08);font-size:11px;text-transform:uppercase}
.data-table td{padding:9px 10px;border-bottom:1px solid var(--border)}
.data-table tr:last-child td{border-bottom:none}
.data-table th:not(:first-child),.data-table td:not(:first-child){text-align:right}
.up{color:var(--accent-red)}
.down{color:var(--accent-green)}
.gold{color:#ffd700}
.mono{font-family:Menlo,monospace}
.card{background:var(--bg-card);border-radius:12px;padding:20px;border:1px solid var(--border)}
.fut-card{background:var(--bg-card);border-radius:10px;padding:14px 16px;border:1px solid var(--border);text-align:center}
.fut-label{font-size:11px;color:var(--text-dim);margin-bottom:6px;font-weight:500;text-transform:uppercase}
.fut-val{font-size:20px;font-weight:700;font-family:Menlo,monospace}
.fut-chg{font-size:12px;font-family:Menlo,monospace;margin-top:3px;font-weight:600}
.news-item{padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.7;display:flex;gap:10px}
.news-item:last-child{border-bottom:none}
.news-tag{flex-shrink:0;font-weight:700;font-size:12px;padding:2px 8px;border-radius:4px}
.news-tag.red{background:rgba(255,71,87,0.15);color:var(--accent-red)}
.news-tag.gold{background:rgba(255,165,2,0.15);color:var(--accent-gold)}
.news-tag.cyan{background:rgba(0,210,211,0.15);color:#00d2d3}
.news-content{color:var(--text-secondary)}
.news-content strong{color:var(--text-primary);font-weight:600}
.strategy-card{background:linear-gradient(135deg,var(--bg-card) 0%,#151d33 100%);border-radius:14px;padding:24px;border:1px solid rgba(255,165,2,0.15)}
.strategy-list{list-style:none}
.strategy-list li{padding:8px 0;font-size:13px;line-height:1.7;display:flex;gap:8px;align-items:flex-start;border-bottom:1px solid var(--border)}
.strategy-list li:last-child{border-bottom:none}
.strategy-bullet{flex-shrink:0;width:6px;height:6px;border-radius:50%;background:var(--accent-gold);margin-top:8px}
.highlight{color:var(--accent-gold);font-weight:700}
.highlight-red{color:var(--accent-red);font-weight:700}
.alert-banner{margin:0 48px;padding:14px 20px;background:linear-gradient(90deg,rgba(255,71,87,0.12),rgba(255,71,87,0.05));border:1px solid rgba(255,71,87,0.2);border-radius:0 0 12px 12px;display:flex;align-items:center;gap:12px}
.alert-icon{font-size:20px}
.alert-text{font-size:13px;color:#ff6b81;line-height:1.6;font-weight:500}
.alert-text strong{color:#fff}
.tracker{background:rgba(255,165,2,0.06);border:1px solid rgba(255,165,2,0.15);border-radius:10px;padding:16px 20px;margin-bottom:24px}
.tracker-title{font-size:13px;font-weight:700;color:var(--accent-gold);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.tracker-items{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tracker-item{font-size:12px;color:var(--text-secondary);line-height:1.6;padding:6px 10px;background:rgba(0,0,0,0.2);border-radius:6px}
.tracker-item strong{color:var(--text-primary)}
.footer{text-align:center;padding:24px 48
