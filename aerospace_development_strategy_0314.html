:root{--bg-deep:#0a0e1a;--bg-card:#111827;--accent-red:#ff4757;--accent-green:#2ed573;--accent-gold:#ffa502;--accent-blue:#3742fa;--accent-cyan:#00d2d3;--text-primary:#f1f2f6;--text-secondary:#a4b0be;--text-dim:#57606f;--border:rgba(255,255,255,0.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-deep);color:var(--text-primary);font-family:'PingFang SC','Microsoft YaHei',sans-serif;width:1280px}
.hero{position:relative;padding:40px 48px 32px;background:linear-gradient(135deg,#0a0e1a 0%,#0d1a2d 40%,#1a2d4d 70%,#0a0e1a 100%);overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;right:-20%;width:600px;height:600px;background:radial-gradient(circle,rgba(55,66,250,0.1) 0%,transparent 70%);pointer-events:none}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1}
.hero-title{font-size:36px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#00d2d3 0%,#3742fa 50%,#a855f7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:14px;color:var(--text-secondary);margin-top:8px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(55,66,250,0.15);border:1px solid rgba(55,66,250,0.3);border-radius:8px;padding:10px 18px}
.hero-badge-dot{width:8px;height:8px;border-radius:50%;background:var(--accent-cyan)}
.hero-badge-text{font-size:13px;color:var(--accent-cyan);font-weight:600}
.hero-headline{margin-top:24px;padding:16px 20px;background:rgba(55,66,250,0.06);border-left:3px solid var(--accent-blue);border-radius:0 8px 8px 0;font-size:15px;line-height:1.8;color:var(--accent-cyan);font-weight:500}
.content{padding:24px 48px 40px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.section{margin-bottom:24px}
.card{background:var(--bg-card);border-radius:12px;padding:20px;border:1px solid var(--border)}
.sec-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.sec-icon{font-size:20px}
.sec-title{font-size:16px;font-weight:700;letter-spacing:1px}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{text-align:left;color:var(--text-dim);font-weight:500;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.08);font-size:11px;text-transform:uppercase}
.data-table td{padding:9px 10px;border-bottom:1px solid var(--border)}
.data-table tr:last-child td{border-bottom:none}
.data-table th:not(:first-child),.data-table td:not(:first-child){text-align:right}
.up{color:var(--accent-red)}
.down{color:var(--accent-green)}
.blue{color:var(--accent-cyan)}
.gold{color:var(--accent-gold)}
.mono{font-family:Menlo,monospace}
.strategy-card{background:linear-gradient(135deg,var(--bg-card) 0%,#151d33 100%);border-radius:14px;padding:24px;border:1px solid rgba(55,66,250,0.15)}
.strategy-list{list-style:none}
.strategy-list li{padding:8px 0;font-size:13px;line-height:1.7;display:flex;gap:8px;align-items:flex-start;border-bottom:1px solid var(--border)}
.strategy-list li:last-child{border-bottom:none}
.strategy-bullet{flex-shrink:0;width:6px;height:6px;border-radius:50%;background:var(--accent-cyan);margin-top:8px}
.highlight{color:var(--accent-gold);font-weight:700}
.highlight-red{color:var(--accent-red);font-weight:700}
.day-card{background:var(--bg-card);border-radius:12px;padding:20px;border:1px solid var(--border);border-left:3px solid var(--accent-blue)}
.day-title{font-size:14px;font-weight:700;color:var(--accent-cyan);margin-bottom:12px}
.day-content{font-size:13px;line-height:1.8;color:var(--text-secondary)}
.day-content strong{color:var(--text-primary)}
.price-box{background:rgba(0,0,0,0.2);border-radius:8px;padding:12px;margin-top:10px}
.price-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.price-label{color:var(--text-dim)}
.price-value{font-family:Menlo,monospace;font-weight:600}
.kpi-card{background:var(--bg-card);border-radius:10px;padding:16px;text-align:center;border:1px solid var(--border)}
.kpi-label{font-size:11px;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase}
.kpi-value{font-size:28px;font-weight:800;font-family:Menlo,monospace}
.kpi-sub{font-size:11px;color:var(--text-secondary);margin-top:4px}
.footer{text-align:center;padding:24px 48px;color:var(--text-dim);font-size:11px;border-top:1px solid var(--border);line-height:1.8}
</style>
</head>
