<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} - {{DATE}}</title>
<style>
/* ===== 金融研报深色主题 ===== */
:root {
  --bg-deep: #0a0e1a;
  --bg-card: #111827;
  --bg-card-alt: #1a2332;
  --accent-red: #ff4757;
  --accent-green: #2ed573;
  --accent-gold: #ffa502;
  --accent-blue: #3742fa;
  --accent-cyan: #00d2d3;
  --accent-purple: #a855f7;
  --text-primary: #f1f2f6;
  --text-secondary: #a4b0be;
  --text-dim: #57606f;
  --border: rgba(255,255,255,0.06);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
  width: 1280px; padding: 0;
}

/* ===== Hero ===== */
.hero {
  position: relative; padding: 40px 48px 32px;
  background: linear-gradient(135deg, #0a0e1a 0%, #1a1040 40%, #2d1b4e 70%, #0a0e1a 100%);
  overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; top: -50%; right: -20%;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(255,71,87,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.hero-top { display: flex; justify-content: space-between; align-items: flex-start; position: relative; z-index: 1; }
.hero-title {
  font-size: 36px; font-weight: 900; letter-spacing: 3px;
  background: linear-gradient(135deg, #fff 0%, #ffa502 50%, #ff6348 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero-sub { font-size: 14px; color: var(--text-secondary); margin-top: 8px; font-weight: 300; letter-spacing: 1px; }
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,71,87,0.15); border: 1px solid rgba(255,71,87,0.3);
  border-radius: 8px; padding: 10px 18px;
}
.hero-badge-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-red); }
.hero-badge-text { font-size: 13px; color: var(--accent-red); font-weight: 600; letter-spacing: 1px; }
.hero-headline {
  position: relative; z-index: 1; margin-top: 24px; padding: 16px 20px;
  background: rgba(255,165,2,0.06); border-left: 3px solid var(--accent-gold);
  border-radius: 0 8px 8px 0; font-size: 15px; line-height: 1.8;
  color: var(--accent-gold); font-weight: 500;
}
/* Badge variants */
.hero-badge.green { background: rgba(46,213,115,0.15); border-color: rgba(46,213,115,0.3); }
.hero-badge.green .hero-badge-dot { background: var(--accent-green); }
.hero-badge.green .hero-badge-text { color: var(--accent-green); }
.hero-badge.gold { background: rgba(255,165,2,0.15); border-color: rgba(255,165,2,0.3); }
.hero-badge.gold .hero-badge-dot { background: var(--accent-gold); }
.hero-badge.gold .hero-badge-text { color: var(--accent-gold); }

/* ===== Layout ===== */
.content { padding: 24px 48px 40px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
.grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
.section { margin-bottom: 24px; }

/* ===== Index Cards ===== */
.idx-card {
  background: var(--bg-card); border-radius: 12px; padding: 16px 18px;
  border: 1px solid var(--border); position: relative; overflow: hidden;
}
.idx-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; }
.idx-card.up::after { background: linear-gradient(90deg, var(--accent-red), transparent); }
.idx-card.down::after { background: linear-gradient(90deg, var(--accent-green), transparent); }
.idx-name { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
.idx-val { font-size: 24px; font-weight: 700; font-family: 'Menlo', 'Courier New', monospace; }
.idx-val.up { color: var(--accent-red); }
.idx-val.down { color: var(--accent-green); }
.idx-val.flat { color: var(--text-dim); }
.idx-chg { font-size: 13px; font-family: 'Menlo', monospace; margin-top: 4px; font-weight: 600; }
.idx-chg.up { color: var(--accent-red); }
.idx-chg.down { color: var(--accent-green); }
.idx-tag { position: absolute; top: 12px; right: 14px; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.idx-tag.live { background: rgba(0,210,211,0.15); color: var(--accent-cyan); }
.idx-tag.pre { background: rgba(255,165,2,0.15); color: var(--accent-gold); }
.idx-tag.close { background: rgba(167,139,250,0.15); color: #a78bfa; }

/* ===== Section Headers ===== */
.sec-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  padding-bottom: 10px; border-bottom: 1px solid var(--border);
}
.sec-icon { font-size: 20px; }
.sec-title { font-size: 16px; font-weight: 700; letter-spacing: 1px; }
.sec-badge { font-size: 11px; padding: 2px 10px; border-radius: 20px; font-weight: 500; }

/* ===== Tables ===== */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th {
  text-align: left; color: var(--text-dim); font-weight: 500; padding: 8px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
}
.data-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); }
.data-table tr:last-child td { border-bottom: none; }
.data-table th:not(:first-child), .data-table td:not(:first-child) { text-align: right; }
.data-table tr:hover td { background: rgba(255,255,255,0.02); }

.up { color: var(--accent-red); }
.down { color: var(--accent-green); }
.gold { color: var(--accent-gold); }
.mono { font-family: 'Menlo', 'Courier New', monospace; }

/* ===== Chips ===== */
.chip { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.chip-fire { background: rgba(255,71,87,0.12); color: var(--accent-red); }
.chip-oil { background: rgba(255,165,2,0.12); color: var(--accent-gold); }
.chip-gold { background: rgba(255,215,0,0.12); color: #ffd700; }
.chip-cold { background: rgba(46,213,115,0.12); color: var(--accent-green); }
.chip-blue { background: rgba(55,66,250,0.12); color: #5f6cff; }
.chip-cyan { background: rgba(0,210,211,0.12); color: var(--accent-cyan); }
.chip-purple { background: rgba(168,85,247,0.12); color: var(--accent-purple); }
.chip-limit { background: rgba(255,71,87,0.2); color: #fff; border: 1px solid rgba(255,71,87,0.4); font-weight: 700; }
.chip-down-limit { background: rgba(46,213,115,0.2); color: #fff; border: 1px solid rgba(46,213,115,0.4); font-weight: 700; }

/* ===== Cards ===== */
.card { background: var(--bg-card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
.card-alt { background: var(--bg-card-alt); }

/* ===== Futures Strip ===== */
.fut-card {
  background: var(--bg-card); border-radius: 10px; padding: 14px 16px;
  border: 1px solid var(--border); text-align: center;
}
.fut-label { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.fut-val { font-size: 20px; font-weight: 700; font-family: 'Menlo', monospace; }
.fut-chg { font-size: 12px; font-family: 'Menlo', monospace; margin-top: 3px; font-weight: 600; }

/* ===== News ===== */
.news-item { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.7; display: flex; gap: 10px; }
.news-item:last-child { border-bottom: none; }
.news-tag {
  flex-shrink: 0; font-weight: 700; font-size: 12px; padding: 2px 8px;
  border-radius: 4px; height: fit-content; margin-top: 2px;
}
.news-tag.red { background: rgba(255,71,87,0.15); color: var(--accent-red); }
.news-tag.gold { background: rgba(255,165,2,0.15); color: var(--accent-gold); }
.news-tag.blue { background: rgba(55,66,250,0.15); color: #7c83ff; }
.news-tag.green { background: rgba(46,213,115,0.15); color: var(--accent-green); }
.news-tag.cyan { background: rgba(0,210,211,0.15); color: var(--accent-cyan); }
.news-tag.purple { background: rgba(168,85,247,0.15); color: var(--accent-purple); }
.news-content { color: var(--text-secondary); }
.news-content strong { color: var(--text-primary); font-weight: 600; }

/* ===== Sentiment ===== */
.sentiment-wrap { background: var(--bg-card); border-radius: 12px; padding: 16px 20px; border: 1px solid var(--border); margin-bottom: 24px; }
.sentiment-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
.sentiment-bar { display: flex; height: 10px; border-radius: 5px; overflow: hidden; gap: 2px; }
.sentiment-bar .bar-up { background: linear-gradient(90deg, var(--accent-red), #ff6b81); border-radius: 5px 0 0 5px; }
.sentiment-bar .bar-down { background: linear-gradient(90deg, #26d97a, var(--accent-green)); border-radius: 0 5px 5px 0; }
.sentiment-bar .bar-flat { background: var(--text-dim); }
.sentiment-footer { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-top: 8px; }

/* ===== Strategy ===== */
.strategy-card {
  background: linear-gradient(135deg, var(--bg-card) 0%, #151d33 100%);
  border-radius: 14px; padding: 24px; border: 1px solid rgba(255,165,2,0.15);
  position: relative; overflow: hidden;
}
.strategy-card::before {
  content: ''; position: absolute; top: 0; right: 0; width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(255,165,2,0.05), transparent 70%);
}
.strategy-list { list-style: none; padding: 0; }
.strategy-list li {
  padding: 8px 0; font-size: 13px; line-height: 1.7;
  display: flex; gap: 8px; align-items: flex-start;
  border-bottom: 1px solid var(--border);
}
.strategy-list li:last-child { border-bottom: none; }
.strategy-bullet { flex-shrink: 0; width: 6px; height: 6px; border-radius: 50%; background: var(--accent-gold); margin-top: 8px; }
.highlight { color: var(--accent-gold); font-weight: 700; }
.highlight-red { color: var(--accent-red); font-weight: 700; }
.highlight-green { color: var(--accent-green); font-weight: 700; }

/* ===== Alert Banner ===== */
.alert-banner {
  margin: 0 48px; padding: 14px 20px;
  background: linear-gradient(90deg, rgba(255,71,87,0.12), rgba(255,71,87,0.05));
  border: 1px solid rgba(255,71,87,0.2); border-radius: 0 0 12px 12px;
  display: flex; align-items: center; gap: 12px;
}
.alert-icon { font-size: 20px; }
.alert-text { font-size: 13px; color: #ff6b81; line-height: 1.6; font-weight: 500; }
.alert-text strong { color: #fff; }

/* ===== Event Tracker ===== */
.tracker {
  background: rgba(255,71,87,0.06); border: 1px solid rgba(255,71,87,0.15);
  border-radius: 10px; padding: 16px 20px; margin-bottom: 24px;
}
.tracker.gold { background: rgba(255,165,2,0.06); border-color: rgba(255,165,2,0.15); }
.tracker.blue { background: rgba(55,66,250,0.06); border-color: rgba(55,66,250,0.15); }
.tracker-title { font-size: 13px; font-weight: 700; color: var(--accent-red); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.tracker.gold .tracker-title { color: var(--accent-gold); }
.tracker.blue .tracker-title { color: #7c83ff; }
.tracker-items { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.tracker-item { font-size: 12px; color: var(--text-secondary); line-height: 1.6; padding: 6px 10px; background: rgba(0,0,0,0.2); border-radius: 6px; }
.tracker-item strong { color: var(--text-primary); }

/* ===== KPI Dashboard ===== */
.kpi-card {
  background: var(--bg-card); border-radius: 10px; padding: 16px; text-align: center;
  border: 1px solid var(--border);
}
.kpi-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.kpi-value { font-size: 28px; font-weight: 800; font-family: 'Menlo', monospace; }
.kpi-sub { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

/* ===== Timeline ===== */
.timeline { padding-left: 20px; border-left: 2px solid var(--border); }
.timeline-item { position: relative; padding: 0 0 16px 16px; }
.timeline-item::before {
  content: ''; position: absolute; left: -25px; top: 4px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent-gold); border: 2px solid var(--bg-deep);
}
.timeline-item.red::before { background: var(--accent-red); }
.timeline-item.green::before { background: var(--accent-green); }
.timeline-date { font-size: 11px; color: var(--text-dim); margin-bottom: 2px; }
.timeline-text { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

/* ===== Progress Bar ===== */
.progress-wrap { margin: 8px 0; }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.progress-bar { height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; }
.progress-fill.red { background: linear-gradient(90deg, var(--accent-red), #ff6b81); }
.progress-fill.green { background: linear-gradient(90deg, var(--accent-green), #6ef3b0); }
.progress-fill.gold { background: linear-gradient(90deg, var(--accent-gold), #ffd93d); }
.progress-fill.blue { background: linear-gradient(90deg, var(--accent-blue), #6c72ff); }

/* ===== Footer ===== */
.footer {
  text-align: center; padding: 24px 48px; color: var(--text-dim); font-size: 11px;
  border-top: 1px solid var(--border); line-height: 1.8;
}
</style>
</head>
